<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden Monitoring System</title>
  <link rel="stylesheet" href="static/main.css">
</head>
<body>
  <main class="dashboard" aria-label="240 by 320 weather dashboard">
    <h1>Garden Monitoring System</h1>

    <section class="reading" aria-label="Wind details">
      <h2>Wind</h2>
      <p><span id="windSpeed">12</span> km/h <span id="windDirection">NE</span></p>
    </section>

    <section class="reading" aria-label="Humidity">
      <h2>Humidity</h2>
      <p><span id="humidity">64</span>%</p>
    </section>

    <section class="reading" aria-label="Rain chance">
      <h2>Rain</h2>
      <p><span id="rain">10</span>mm</p>
    </section>
  </main>

  <script src="static/main.js"></script>
</body>
</html>
